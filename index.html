<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanSat Ground Control Station</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<div id="app">

    <!-- Header -->
    <header class="top-bar">
        <div class="title-section">
            <h1>CanSat Ground Control Station</h1>
            <p>Mission Operations Dashboard</p>
        </div>
    </header>

    <main class="dashboard">

        <!-- Control Bar -->
        <section id="control-bar">

            <button id="start-btn">▶ Start Telemetry</button>
            <button id="stop-btn">■ Stop Telemetry</button>
            <button id="csv-btn">📄 Export CSV</button>
            <button id="graph-btn">📊 Export Graph</button>
            <button id="sync-btn">🕒 Sync PC Time</button>
            <button id="reset-btn">🔄 Reset Packet</button>

        </section>

        <!-- Mission Control -->
        <section id="mission-controls">

            <h2>Mission Control</h2>

            <div class="mission-buttons">

                <button id="separation-btn">Manual Separation</button>

                <button id="parachute-btn">Emergency Parachute</button>

                <button id="redundant-btn">Redundant Activation</button>

            </div>

            <div class="command-status">

                <h3>Command Status</h3>

                <p>Status :
                    <span id="command-status">
                        Waiting...
                    </span>
                </p>

            </div>

        </section>

        <!-- Telemetry -->
        <section id="telemetry">

            <h2>Telemetry</h2>

            <table class="telemetry-table">

                <tr>
                    <td>Packet Count</td>
                    <td id="packet-count">0</td>
                </tr>

                <tr>
                    <td>Mission Time</td>
                    <td id="mission-time">00:00:00</td>
                </tr>

                <tr>
                    <td>Altitude</td>
                    <td id="altitude">0 m</td>
                </tr>

                <tr>
                    <td>Pressure</td>
                    <td id="pressure">0 Pa</td>
                </tr>

                <tr>
                    <td>Temperature</td>
                    <td id="temperature">0 °C</td>
                </tr>

                <tr>
                    <td>Descent Rate</td>
                    <td id="descent-rate">0 m/s</td>
                </tr>

                <tr>
                    <td>Battery Voltage</td>
                    <td id="battery">0 V</td>
                </tr>

                <tr>
                    <td>Latitude</td>
                    <td id="latitude">0.000000</td>
                </tr>

                <tr>
                    <td>Longitude</td>
                    <td id="longitude">0.000000</td>
                </tr>

            </table>

        </section>

        <!-- Error System -->
        <section id="error-system"></section>

        <!-- Graphs -->
        <section id="graphs"></section>

        <!-- GPS -->
        <section id="tracking-map"></section>

        <!-- Orientation -->
        <section id="orientation"></section>

        <!-- Video -->
        <section id="video-stream"></section>

    </main>

</div>

<script src="js/app.js"></script>

</body>
</html>
